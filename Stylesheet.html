<style>
/**
 * ═══════════════════════════════════════════════════════════════════════════
 * CBMS RCA MANAGER — PREMIUM DARK THEME
 * ═══════════════════════════════════════════════════════════════════════════
 * 
 * Design System: Clean, minimal, analytical, premium
 * Typography: Space Grotesk (UI), Space Mono (data/numbers)
 */

/* ═══════════════════════════════════════════════════════════════════════════
   FONTS
   ═══════════════════════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

/* ═══════════════════════════════════════════════════════════════════════════
   CSS VARIABLES — DESIGN TOKENS
   ═══════════════════════════════════════════════════════════════════════════ */
:root {
  /* Backgrounds */
  --bg-primary: #000000;
  --bg-secondary: #0a0a0a;
  --bg-elevated: #111111;
  --bg-card: #151515;
  --bg-input: #0d0d0d;
  
  /* Borders */
  --border: #1f1f1f;
  --border-hover: #2a2a2a;
  --border-focus: #3a3a3a;
  
  /* Text */
  --text-primary: #ffffff;
  --text-secondary: #888888;
  --text-muted: #555555;
  --text-label: #666666;
  
  /* Accents */
  --accent-green: #00ff88;
  --accent-green-dim: rgba(0, 255, 136, 0.1);
  --accent-red: #ff0055;
  --accent-red-dim: rgba(255, 0, 85, 0.1);
  --accent-yellow: #ffcc00;
  --accent-yellow-dim: rgba(255, 204, 0, 0.1);
  --accent-blue: #0088ff;
  --accent-blue-dim: rgba(0, 136, 255, 0.1);
  
  /* Status Colors */
  --status-active: #00ff88;
  --status-idle: #ffcc00;
  --status-offline: #555555;
  --status-disabled: #ff0055;
  
  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.5);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.6);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.7);
  --shadow-glow-green: 0 0 20px rgba(0, 255, 136, 0.3);
  --shadow-glow-red: 0 0 20px rgba(255, 0, 85, 0.3);
  
  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  
  /* Radius */
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  
  /* Transitions */
  --transition-fast: 0.15s ease;
  --transition-normal: 0.25s ease;
}

/* ═══════════════════════════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  line-height: 1.5;
}

/* ═══════════════════════════════════════════════════════════════════════════
   TYPOGRAPHY
   ═══════════════════════════════════════════════════════════════════════════ */
h1, h2, h3, h4, h5, h6 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.mono, .data, code, .case-id, .itn, .amount {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
}

.meta-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
}

/* ═══════════════════════════════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════════════════════════════ */
header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: var(--space-md) var(--space-lg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

header h1 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

header h1::before {
  content: '';
  display: inline-block;
  width: 8px;
  height: 8px;
  background: var(--accent-green);
  border-radius: 50%;
  box-shadow: var(--shadow-glow-green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

#status {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  padding: var(--space-sm) var(--space-md);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  min-width: 200px;
  text-align: center;
  transition: all var(--transition-normal);
}

#status.success {
  background: var(--accent-green-dim);
  border-color: var(--accent-green);
  color: var(--accent-green);
}

#status.error {
  background: var(--accent-red-dim);
  border-color: var(--accent-red);
  color: var(--accent-red);
}

#status.loading {
  background: var(--accent-blue-dim);
  border-color: var(--accent-blue);
  color: var(--accent-blue);
}

/* ═══════════════════════════════════════════════════════════════════════════
   MAIN CONTAINER
   ═══════════════════════════════════════════════════════════════════════════ */
.container {
  display: grid;
  grid-template-columns: 280px 1fr 300px;
  gap: 1px;
  background: var(--border);
  flex: 1;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════════════════════════════════
   SECTIONS (Left, Middle, Right)
   ═══════════════════════════════════════════════════════════════════════════ */
.left-section,
.middle-section,
.right-section {
  background: var(--bg-primary);
  overflow-y: auto;
  height: calc(100vh - 60px);
}

.left-section {
  padding: var(--space-md);
}

.middle-section {
  padding: var(--space-lg);
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.right-section {
  padding: var(--space-md);
}

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION HEADERS (Collapsible)
   ═══════════════════════════════════════════════════════════════════════════ */
.section-header {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-sm) var(--space-md);
  margin-bottom: var(--space-sm);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-secondary);
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.section-header::after {
  content: '▼';
  font-size: 8px;
  transition: transform var(--transition-fast);
}

.section-header.collapsed::after {
  transform: rotate(-90deg);
}

.section-header:hover {
  background: var(--bg-elevated);
  border-color: var(--border-hover);
  color: var(--text-primary);
}

.section-header.active {
  border-color: var(--accent-green);
  color: var(--accent-green);
}

.section-content {
  padding: var(--space-md);
  margin-bottom: var(--space-md);
  animation: slideDown 0.2s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════════════════════
   FORM ELEMENTS
   ═══════════════════════════════════════════════════════════════════════════ */
select,
input[type="text"],
input[type="file"],
textarea {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-sm) var(--space-md);
  color: var(--text-primary);
  width: 100%;
  transition: all var(--transition-fast);
}

select:hover,
input[type="text"]:hover,
textarea:hover {
  border-color: var(--border-hover);
}

select:focus,
input[type="text"]:focus,
textarea:focus {
  outline: none;
  border-color: var(--accent-green);
  box-shadow: 0 0 0 2px var(--accent-green-dim);
}

textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}

textarea.resizable {
  resize: vertical;
}

label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: var(--space-xs);
}

/* ═══════════════════════════════════════════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════════════════════════════════════════ */
button {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: var(--space-sm) var(--space-md);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--transition-fast);
  border: 1px solid var(--border);
}

/* Secondary Button (default) */
button {
  background: var(--bg-card);
  color: var(--text-secondary);
}

button:hover {
  background: var(--bg-elevated);
  border-color: var(--border-hover);
  color: var(--text-primary);
}

/* Primary Button */
button.primary,
button#upload,
button[onclick*="Resolve"] {
  background: var(--text-primary);
  color: var(--bg-primary);
  border-color: var(--text-primary);
}

button.primary:hover,
button#upload:hover,
button[onclick*="Resolve"]:hover {
  background: var(--accent-green);
  border-color: var(--accent-green);
  box-shadow: var(--shadow-glow-green);
}

/* Danger Button */
button.danger {
  background: transparent;
  color: var(--accent-red);
  border-color: var(--accent-red);
}

button.danger:hover {
  background: var(--accent-red);
  color: var(--bg-primary);
  box-shadow: var(--shadow-glow-red);
}

/* Button Groups */
.buttons-section {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

/* ═══════════════════════════════════════════════════════════════════════════
   TABLES
   ═══════════════════════════════════════════════════════════════════════════ */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

table th {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  background: var(--bg-card);
  padding: var(--space-sm) var(--space-md);
  text-align: left;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}

table td {
  padding: var(--space-sm) var(--space-md);
  border-bottom: 1px solid var(--border);
  transition: background var(--transition-fast);
}

table tr:hover td {
  background: var(--bg-elevated);
}

table td.label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  width: 40%;
  background: var(--bg-card);
}

table td.data {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  color: var(--text-primary);
  cursor: pointer;
}

table td.data:hover {
  color: var(--accent-green);
}

/* Case Info Table */
#caseinfo td,
#transInfo td {
  padding: var(--space-xs) var(--space-sm);
}

/* Pending Cases Table */
#pendingcase {
  font-size: 12px;
}

#pendingcase th {
  background: var(--bg-secondary);
}

#pendingcase tr:nth-child(even) {
  background: var(--bg-card);
}

#pendingcase tr:nth-child(odd) {
  background: var(--bg-primary);
}

/* ═══════════════════════════════════════════════════════════════════════════
   RCA SECTION
   ═══════════════════════════════════════════════════════════════════════════ */
.rca-section {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}

.rca-section input[list] {
  flex: 1;
}

.rca-section input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--accent-green);
}

/* ═══════════════════════════════════════════════════════════════════════════
   UPLOAD BOX
   ═══════════════════════════════════════════════════════════════════════════ */
.upload-box {
  width: 100%;
  height: 60px;
  border: 1px dashed var(--border);
  border-radius: var(--radius-md);
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--bg-input);
  transition: all var(--transition-normal);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  margin-bottom: var(--space-xs);
}

.upload-box:hover,
.upload-box:focus {
  border-color: var(--accent-green);
  background: var(--accent-green-dim);
}

.upload-box span {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.upload-box img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: none;
}

.upload-box .delete-btn {
  position: absolute;
  top: 4px;
  right: 4px;
  padding: 2px 6px;
  font-size: 10px;
  background: var(--accent-red);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  display: none;
}

.upload-box .delete-btn:hover {
  background: #cc0044;
}

.labelupload {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: var(--space-xs);
}

.output {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent-green);
  margin-bottom: var(--space-sm);
}

.error {
  color: var(--accent-red);
}

/* ═══════════════════════════════════════════════════════════════════════════
   QUEUE STATUS
   ═══════════════════════════════════════════════════════════════════════════ */
.queue-status {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-sm);
}

.queue-status > div {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-sm) var(--space-md);
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.queue-status > div:nth-child(3) {
  grid-column: span 2;
  background: var(--accent-yellow-dim);
  border-color: var(--accent-yellow);
}

.queue-status strong {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  font-weight: 500;
}

.queue-status span {
  font-family: 'Space Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
}

/* ═══════════════════════════════════════════════════════════════════════════
   SLA TRACKER
   ═══════════════════════════════════════════════════════════════════════════ */
.sla-indicator {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
}

.sla-indicator.safe {
  background: var(--accent-green-dim);
  color: var(--accent-green);
}

.sla-indicator.warning {
  background: var(--accent-yellow-dim);
  color: var(--accent-yellow);
}

.sla-indicator.danger {
  background: var(--accent-red-dim);
  color: var(--accent-red);
  animation: urgentPulse 1s infinite;
}

@keyframes urgentPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.caution-icon {
  margin-left: var(--space-xs);
  animation: urgentPulse 1s infinite;
}

/* ═══════════════════════════════════════════════════════════════════════════
   WORKING RCA / PENDING CASES
   ═══════════════════════════════════════════════════════════════════════════ */
.working-rca {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  margin-top: var(--space-md);
  max-height: 300px;
  overflow-y: auto;
}

#pendingmessage {
  font-size: 13px;
  color: var(--accent-green);
  padding: var(--space-md);
}

/* ═══════════════════════════════════════════════════════════════════════════
   PDF UPLOADS
   ═══════════════════════════════════════════════════════════════════════════ */
.pdf-uploads label {
  font-size: 11px;
  color: var(--text-muted);
}

.pdf-uploads input[type="file"] {
  font-size: 11px;
  margin-bottom: var(--space-sm);
}

#buttonPDF {
  background: var(--bg-card);
  color: var(--accent-green);
  border: 1px solid var(--accent-green);
}

#buttonPDF:hover {
  background: var(--accent-green);
  color: var(--bg-primary);
}

.success-msg {
  background: var(--accent-green-dim);
  border-radius: var(--radius-md);
  padding: var(--space-sm);
  margin-top: var(--space-sm);
}

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent-green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-left: var(--space-sm);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ═══════════════════════════════════════════════════════════════════════════
   ACTION ICONS
   ═══════════════════════════════════════════════════════════════════════════ */
.action-icons {
  font-size: 14px;
  cursor: pointer;
  margin-left: var(--space-sm);
  opacity: 0.6;
  transition: opacity var(--transition-fast);
}

.action-icons:hover {
  opacity: 1;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════════════════════════════ */
#cannedModal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  z-index: 1000;
  width: 400px;
  max-width: 90vw;
  box-shadow: var(--shadow-lg);
}

#cannedModal h3 {
  font-size: 14px;
  margin-bottom: var(--space-md);
  color: var(--text-primary);
}

#cannedModal input,
#cannedModal textarea,
#cannedModal select {
  margin-bottom: var(--space-sm);
}

#cannedModal button {
  margin-top: var(--space-sm);
  margin-right: var(--space-sm);
}

/* Modal Backdrop */
.modal-backdrop {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.8);
  z-index: 999;
}

/* ═══════════════════════════════════════════════════════════════════════════
   TOAST NOTIFICATIONS
   ═══════════════════════════════════════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: var(--space-lg);
  right: var(--space-lg);
  padding: var(--space-md) var(--space-lg);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  z-index: 1001;
  animation: slideInRight 0.3s ease;
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.toast.success {
  border-color: var(--accent-green);
  background: var(--accent-green-dim);
}

.toast.error {
  border-color: var(--accent-red);
  background: var(--accent-red-dim);
}

@keyframes slideInRight {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* ═══════════════════════════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS HINT
   ═══════════════════════════════════════════════════════════════════════════ */
.shortcuts-hint {
  position: fixed;
  bottom: var(--space-md);
  left: var(--space-md);
  font-size: 10px;
  color: var(--text-muted);
  display: flex;
  gap: var(--space-md);
}

.shortcuts-hint kbd {
  display: inline-block;
  padding: 2px 6px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
}

/* ═══════════════════════════════════════════════════════════════════════════
   REALTIME DASHBOARD WIDGET
   ═══════════════════════════════════════════════════════════════════════════ */
.dashboard-widget {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  margin-bottom: var(--space-md);
}

.dashboard-widget h4 {
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: var(--space-sm);
}

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-xs) 0;
  border-bottom: 1px solid var(--border);
}

.stat-row:last-child {
  border-bottom: none;
}

.stat-row .label {
  font-size: 11px;
  color: var(--text-secondary);
}

.stat-row .value {
